name: style-gate

on:
  pull_request:
    branches:
      - integration
      - main
    paths:
      - ".clang-format"
      - ".clang-tidy"
      - "oh-my-robot/.clang-format"
      - "oh-my-robot/.clang-tidy"
      - "xmake.lua"
      - "oh-my-robot/xmake.lua"
      - "lib/**"
      - "platform/**"
      - "samples/**"
      - "oh-my-robot/lib/**"
      - "oh-my-robot/platform/**"
      - "oh-my-robot/samples/**"
      - ".github/workflows/style-gate.yml"
      - "oh-my-robot/.github/workflows/style-gate.yml"

permissions:
  contents: read

jobs:
  style-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache'

      - name: Setup GNU ARM Embedded Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 'latest'

      - name: Install clang tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            lib/**/*.{c,cc,cpp,cxx,h,hh,hpp,hxx}
            platform/**/*.{c,cc,cpp,cxx,h,hh,hpp,hxx}
            samples/**/*.{c,cc,cpp,cxx,h,hh,hpp,hxx}
            oh-my-robot/lib/**/*.{c,cc,cpp,cxx,h,hh,hpp,hxx}
            oh-my-robot/platform/**/*.{c,cc,cpp,cxx,h,hh,hpp,hxx}
            oh-my-robot/samples/**/*.{c,cc,cpp,cxx,h,hh,hpp,hxx}
          separator: ";"

      - name: Configure xmake (Toolchain discovery)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # 提前执行配置阶段让 xmake 生成工具链缓存和配置，避免后续并行格式化或静态检查时死锁失败
          xmake f -c --toolchain=gnu-rm -m debug --yes

      - name: Run style gate (Format)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Checking format for: ${{ steps.changed-files.outputs.all_changed_files }}"
          xmake format --dry-run --error --files="${{ steps.changed-files.outputs.all_changed_files }}"

      - name: Run style gate (Lint)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Running clang-tidy for: ${{ steps.changed-files.outputs.all_changed_files }}"
          xmake check clang.tidy --files="${{ steps.changed-files.outputs.all_changed_files }}"
